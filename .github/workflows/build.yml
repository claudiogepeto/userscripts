name: build

# Roda quando um FONTE muda. O commit de volta usa o GITHUB_TOKEN, que por
# padrão NÃO re-dispara workflows → sem loop.
on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "xenforo/parts/**"
      - "build.mjs"
      - "third-party.json"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # histórico completo → contagem de commits p/ o PACK_VERSION

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build (dist/ + pack + zip + README)
        run: node build.mjs

      - name: Commit dist/ + README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.user.js README.md
          if git diff --cached --quiet; then
            echo "nada a commitar"
          else
            git commit -m "build: regenera dist/ + README [skip ci]"
            git push
          fi

      - name: Publica userscripts.zip no release "pack"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER=$(grep -m1 '@version' dist/pack.user.js | awk '{print $3}')
          # recria o release a cada build → data e versão sempre frescas (não fica "20 min atrás")
          gh release delete pack --cleanup-tag -y 2>/dev/null || true
          gh release create pack dist/userscripts.zip \
            --title "Pack v${VER} — zip de import" \
            --notes "Backup importável no Violentmonkey/Tampermonkey — instala todos os scripts (meus + recomendados) como entradas separadas. Recriado a cada build."
