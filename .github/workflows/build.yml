name: build

# Roda quando um FONTE muda. O commit de volta usa o GITHUB_TOKEN, que por
# padrão NÃO re-dispara workflows → sem loop.
on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "xenforo/parts/**"
      - "build.mjs"
      - "third-party.json"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build (dist/ + pack + zip + README)
        run: node build.mjs

      - name: Commit dist/ + README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/*.user.js README.md
          if git diff --cached --quiet; then
            echo "nada a commitar"
          else
            git commit -m "build: regenera dist/ + README [skip ci]"
            git push
          fi

      - name: Publica userscripts.zip no release "pack"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create pack --title "Pack (zip de import)" \
            --notes "Backup importável no Violentmonkey/Tampermonkey — instala todos os scripts como entradas separadas. Regenerado a cada build." \
            2>/dev/null || true
          gh release upload pack dist/userscripts.zip --clobber
